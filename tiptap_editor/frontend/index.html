<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Text Editor</title>

  <!-- Quill core -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

  <!-- quill-better-table for full table support -->
  <link href="https://unpkg.com/quill-better-table@1.2.10/dist/quill-better-table.css" rel="stylesheet" />
  <script src="https://unpkg.com/quill-better-table@1.2.10/dist/quill-better-table.js"></script>

  <!-- Streamlit component communication (inline — no UMD build available) -->
  <script>
    /**
     * Minimal Streamlit component API for no-build-step components.
     * Communicates with the parent Streamlit app via postMessage.
     * Implements: setComponentReady, setComponentValue, setFrameHeight,
     *             RENDER_EVENT, and events.addEventListener.
     */
    (function () {
      const Streamlit = {};

      // ── Event system ──────────────────────────────────────
      const _listeners = {};
      Streamlit.RENDER_EVENT = "streamlit:render";

      Streamlit.events = {
        addEventListener: function (type, fn) {
          if (!_listeners[type]) _listeners[type] = [];
          _listeners[type].push(fn);
        },
        removeEventListener: function (type, fn) {
          if (!_listeners[type]) return;
          _listeners[type] = _listeners[type].filter(function (l) { return l !== fn; });
        }
      };

      function _dispatchEvent(type, data) {
        if (!_listeners[type]) return;
        var evt = new CustomEvent(type, { detail: data });
        _listeners[type].forEach(function (fn) { fn(evt); });
      }

      // ── Communication with Streamlit parent ───────────────
      function _sendMessage(type, data) {
        window.parent.postMessage(
          Object.assign({ isStreamlitMessage: true, type: type }, data || {}),
          "*"
        );
      }

      Streamlit.setComponentReady = function () {
        _sendMessage("streamlit:componentReady", { apiVersion: 1 });
      };

      Streamlit.setComponentValue = function (value) {
        _sendMessage("streamlit:setComponentValue", { value: value });
      };

      Streamlit.setFrameHeight = function (height) {
        _sendMessage("streamlit:setFrameHeight", { height: height || document.body.scrollHeight });
      };

      // ── Receive render messages from parent ───────────────
      window.addEventListener("message", function (event) {
        if (
          event.data &&
          event.data.type === "streamlit:render" &&
          event.data.isStreamlitMessage
        ) {
          _dispatchEvent(Streamlit.RENDER_EVENT, event.data);
        }
      });

      // Expose globally
      window.Streamlit = Streamlit;
    })();
  </script>

  <!-- Google Fonts (matches parent app) -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', 'Prompt', sans-serif;
      font-size: 15px;
      background: transparent;
      overflow-x: hidden;
    }

    /* ── Editor container ────────────────────────────────────── */
    #editor-wrapper {
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: border-color 0.2s ease;
    }
    #editor-wrapper:focus-within {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    /* ── Quill toolbar ───────────────────────────────────────── */
    .ql-toolbar.ql-snow {
      border: none;
      border-bottom: 1.5px solid #e5e7eb;
      background: #f9fafb;
      padding: 6px 8px;
      border-radius: 10px 10px 0 0;
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      align-items: center;
    }

    .ql-toolbar.ql-snow .ql-formats {
      margin-right: 6px;
    }

    .ql-toolbar button,
    .ql-toolbar .ql-picker-label {
      border-radius: 4px;
      transition: background 0.15s ease;
    }

    .ql-toolbar button:hover,
    .ql-toolbar .ql-picker-label:hover {
      background: #ede9fe !important;
      color: #4f46e5 !important;
    }

    .ql-toolbar button.ql-active,
    .ql-toolbar .ql-picker-label.ql-active {
      background: #ede9fe !important;
      color: #4f46e5 !important;
    }

    /* ── Quill editor content area ───────────────────────────── */
    .ql-container.ql-snow {
      border: none;
      font-family: 'Sarabun', 'Prompt', sans-serif;
      font-size: 15px;
      line-height: 1.8;
    }

    .ql-editor {
      min-height: 360px;
      padding: 16px 20px;
      color: #1e293b;
      font-family: 'Sarabun', 'Prompt', sans-serif;
      line-height: 1.8;
    }

    .ql-editor.ql-blank::before {
      color: #94a3b8;
      font-style: normal;
      font-family: 'Sarabun', 'Prompt', sans-serif;
    }

    /* Heading styles */
    .ql-editor h1 { font-size: 1.6em; font-weight: 700; color: #0f172a; margin-bottom: 0.3em; }
    .ql-editor h2 { font-size: 1.35em; font-weight: 600; color: #1e293b; margin-bottom: 0.25em; }
    .ql-editor h3 { font-size: 1.15em; font-weight: 600; color: #334155; margin-bottom: 0.2em; }

    /* List styles */
    .ql-editor ol, .ql-editor ul { padding-left: 1.5em; }
    .ql-editor li { margin-bottom: 0.2em; }

    /* Blockquote */
    .ql-editor blockquote {
      border-left: 3px solid #6366f1;
      padding-left: 12px;
      color: #475569;
      font-style: italic;
      margin: 8px 0;
    }

    /* Code block */
    .ql-editor pre.ql-syntax {
      background: #f1f5f9;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.88em;
      color: #334155;
    }

    /* ── Table styles (quill-better-table) ───────────────────── */
    .ql-better-table td, .ql-better-table th {
      border: 1px solid #e2e8f0;
      padding: 6px 10px;
      min-width: 80px;
      font-family: 'Sarabun', 'Prompt', sans-serif;
    }
    .ql-better-table th {
      background: #f8fafc;
      font-weight: 600;
    }

    /* Table context menu */
    .qlbt-operation-menu {
      font-family: 'Sarabun', 'Prompt', sans-serif !important;
      font-size: 13px !important;
      border-radius: 8px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
    }

    /* ── Insert table button in toolbar ──────────────────────── */
    #insert-table-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 7px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Sarabun', 'Prompt', sans-serif;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: background 0.15s ease;
      white-space: nowrap;
    }
    #insert-table-btn:hover {
      background: #ede9fe;
      color: #4f46e5;
    }

    /* Separator in toolbar */
    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: #e5e7eb;
      margin: 0 4px;
      display: inline-block;
      vertical-align: middle;
    }

    /* ── Status bar ──────────────────────────────────────────── */
    #status-bar {
      padding: 4px 12px;
      font-size: 11.5px;
      color: #94a3b8;
      background: #f9fafb;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 0 0 10px 10px;
      font-family: 'Sarabun', 'Prompt', sans-serif;
    }
    #char-count { font-variant-numeric: tabular-nums; }
    #save-indicator {
      font-size: 11px;
      color: #10b981;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #save-indicator.visible { opacity: 1; }
  </style>
</head>
<body>

<div id="editor-wrapper">
  <!-- Quill mounts its own toolbar into #toolbar-container, then #editor -->
  <div id="toolbar-container">
    <span class="ql-formats">
      <select class="ql-header">
        <option value="1">Heading 1</option>
        <option value="2">Heading 2</option>
        <option value="3">Heading 3</option>
        <option selected>Normal</option>
      </select>
    </span>
    <span class="ql-formats">
      <button class="ql-bold" title="Bold"></button>
      <button class="ql-italic" title="Italic"></button>
      <button class="ql-underline" title="Underline"></button>
      <button class="ql-strike" title="Strikethrough"></button>
    </span>
    <span class="ql-formats">
      <button class="ql-list" value="ordered" title="Ordered list"></button>
      <button class="ql-list" value="bullet" title="Bullet list"></button>
    </span>
    <span class="ql-formats">
      <button class="ql-blockquote" title="Blockquote"></button>
      <button class="ql-code-block" title="Code block"></button>
    </span>
    <span class="ql-formats">
      <button class="ql-link" title="Insert link"></button>
    </span>
    <span class="ql-formats">
      <button class="ql-clean" title="Remove formatting"></button>
    </span>
    <!-- Custom table button appended after Quill initialises -->
    <span class="ql-formats" id="table-btn-container"></span>
  </div>
  <div id="editor"></div>
  <div id="status-bar">
    <span id="char-count">0 ตัวอักษร</span>
    <span id="save-indicator">✓ บันทึกแล้ว</span>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ── Register quill-better-table module ───────────────────────────────────
  Quill.register({
    'modules/better-table': quillBetterTable
  }, true);

  // ── Initialise Quill ──────────────────────────────────────────────────────
  const quill = new Quill('#editor', {
    theme: 'snow',
    modules: {
      toolbar: '#toolbar-container',
      'better-table': {
        operationMenu: {
          items: {
            unmergeCells: { text: 'Unmerge cells' }
          }
        }
      },
      keyboard: {
        bindings: quillBetterTable.keyboardBindings
      }
    },
    placeholder: 'Start writing your research here...',
  });

  // ── Inject custom "Insert Table" button ──────────────────────────────────
  const tableBtnContainer = document.getElementById('table-btn-container');
  const insertTableBtn = document.createElement('button');
  insertTableBtn.id = 'insert-table-btn';
  insertTableBtn.title = 'Insert table';
  insertTableBtn.innerHTML = '&#9707; Table';
  tableBtnContainer.appendChild(insertTableBtn);

  insertTableBtn.addEventListener('click', function (e) {
    e.preventDefault();
    const tableModule = quill.getModule('better-table');
    tableModule.insertTable(3, 3);
  });

  // ── Streamlit component communication ────────────────────────────────────
  let _initialised = false;
  let _lastHtml = '';
  let _debounceTimer = null;
  const DEBOUNCE_MS = 300;

  function sendValue(html) {
    // Only send if changed
    if (html === _lastHtml) return;
    _lastHtml = html;
    // Streamlit.setComponentValue is the canonical way to pass data back
    Streamlit.setComponentValue(html);

    // Flash "saved" indicator
    const indicator = document.getElementById('save-indicator');
    indicator.classList.add('visible');
    clearTimeout(indicator._timer);
    indicator._timer = setTimeout(() => indicator.classList.remove('visible'), 1500);
  }

  function updateCharCount(html) {
    // Strip tags to count visible characters
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    const text = tmp.innerText || tmp.textContent || '';
    const count = text.replace(/\s+/g, ' ').trim().length;
    document.getElementById('char-count').textContent =
      count.toLocaleString('th-TH') + ' ตัวอักษร';
  }

  // Listen for content changes with debounce
  quill.on('text-change', function () {
    const html = quill.root.innerHTML;
    updateCharCount(html);
    clearTimeout(_debounceTimer);
    _debounceTimer = setTimeout(() => sendValue(html), DEBOUNCE_MS);
  });

  // ── Receive data FROM Streamlit ───────────────────────────────────────────
  function onRender(event) {
    const data = event.detail;

    // On first render, load initial content
    if (!_initialised) {
      _initialised = true;
      const initialHtml = (data.args && data.args.value) ? data.args.value : '';

      if (initialHtml && initialHtml.trim()) {
        // Use Quill's clipboard.dangerouslyPasteHTML to set rich content
        quill.clipboard.dangerouslyPasteHTML(initialHtml);
      }
      _lastHtml = quill.root.innerHTML;
      updateCharCount(_lastHtml);

      // Tell Streamlit the component height so it resizes correctly
      Streamlit.setFrameHeight(document.body.scrollHeight || 480);
    } else {
      // Subsequent renders: only update content if it changed externally
      // (i.e., AI wrote new content into the editor via _pending_work_content)
      const incomingHtml = (data.args && data.args.value) ? data.args.value : '';
      if (incomingHtml !== _lastHtml && incomingHtml !== quill.root.innerHTML) {
        quill.clipboard.dangerouslyPasteHTML(incomingHtml);
        _lastHtml = quill.root.innerHTML;
        updateCharCount(_lastHtml);
      }
    }
  }

  // Register with Streamlit
  Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
  Streamlit.setComponentReady();
})();
</script>
</body>
</html>
